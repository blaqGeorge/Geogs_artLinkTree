<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@geogs_art — Links</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glow: rgba(255,255,255,0.85);
      --orb1: #1a1a1a;
      --orb2: #2e2e2e;
      --accent: #ffffff;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.1);
      --card-hover: rgba(255,255,255,0.12);
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Animated background orbs ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(2px);
      animation: float linear infinite;
      background: radial-gradient(circle at 38% 35%, #ffffff33, #000 70%);
      opacity: 0.7;
    }

    .orb:nth-child(1) { width:220px; height:220px; left:12%;  top:8%;  animation-duration:22s; }
    .orb:nth-child(2) { width:90px;  height:90px;  left:72%;  top:12%; animation-duration:18s; animation-delay:-5s; }
    .orb:nth-child(3) { width:60px;  height:60px;  left:5%;   top:52%; animation-duration:26s; animation-delay:-10s; }
    .orb:nth-child(4) { width:130px; height:130px; left:78%;  top:45%; animation-duration:30s; animation-delay:-8s; }
    .orb:nth-child(5) { width:45px;  height:45px;  left:48%;  top:80%; animation-duration:20s; animation-delay:-3s; }

    /* Central glow pulse behind avatar */
    .center-glow {
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      animation: pulse 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%   { transform: translateY(0px) scale(1); }
      40%  { transform: translateY(-30px) scale(1.04); }
      70%  { transform: translateY(15px) scale(0.97); }
      100% { transform: translateY(0px) scale(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -60%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -60%) scale(1.1); }
    }

    @keyframes avatarGlow {
      0%, 100% { box-shadow: 0 0 30px 6px rgba(255,255,255,0.25), 0 0 80px 20px rgba(255,255,255,0.08); }
      50%       { box-shadow: 0 0 50px 12px rgba(255,255,255,0.45), 0 0 120px 40px rgba(255,255,255,0.15); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 56px 20px 80px;
    }

    /* ── Profile ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      animation: fadeUp 0.8s ease both;
    }

    .avatar-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #fff 0%, #555 50%, #fff 100%);
      margin-bottom: 18px;
      animation: avatarGlow 4s ease-in-out infinite;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #111;
    }

    /* Fallback orb if no image */
    .avatar-ring .avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #ffffff60, #000 72%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .handle {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 0.82rem;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px 22px;
      text-decoration: none;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeUp 0.8s ease both;
    }

    .link-btn:nth-child(1) { animation-delay: 0.15s; }
    .link-btn:nth-child(2) { animation-delay: 0.25s; }
    .link-btn:nth-child(3) { animation-delay: 0.35s; }
    .link-btn:nth-child(4) { animation-delay: 0.45s; }
    .link-btn:nth-child(5) { animation-delay: 0.55s; }

    .link-btn:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 30px rgba(255,255,255,0.08);
    }

    .link-btn:active {
      transform: scale(0.98);
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.3rem;
    }

    /* Platform accent colours */
    .yt   .icon-wrap { background: rgba(255,0,0,0.18);    border: 1px solid rgba(255,0,0,0.3); }
    .etsy .icon-wrap { background: rgba(241,101,41,0.18); border: 1px solid rgba(241,101,41,0.3); }
    .art  .icon-wrap { background: rgba(0,150,255,0.18);  border: 1px solid rgba(0,150,255,0.3); }
    .tt   .icon-wrap { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
    .ig   .icon-wrap { background: rgba(225,48,108,0.18); border: 1px solid rgba(225,48,108,0.3); }

    .btn-text {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .btn-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .btn-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.38);
      margin-top: 2px;
    }

    .arrow {
      font-size: 0.9rem;
      opacity: 0.3;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link-btn:hover .arrow {
      opacity: 0.7;
      transform: translateX(4px);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 48px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
      text-align: center;
      animation: fadeUp 0.8s 0.7s ease both;
    }

    /* ── SVG Icons ── */
    svg { display: block; }
  </style>
</head>
<body>

    <div class="orb"></div>
    <div class="orb"></div>

  </div>

</body>
